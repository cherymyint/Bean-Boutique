<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Bean Boutique</title>
    <link rel="stylesheet" href="css/style.css" />
    <link
      href="https://api.iconify.design/material-symbols-light.css"
      rel="stylesheet"
    />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
      integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
      crossorigin="anonymous"
      referrerpolicy="no-referrer"
    />
    <script src="https://code.iconify.design/iconify-icon/1.0.7/iconify-icon.min.js"></script>
  </head>

  <body>
    <main>
      <section class="contact-section container" id="contact">
        <h1
          class="contact-title"
          data-aos="zoom-in"
          data-aos-duration="3000"
          data-aos-easing="linear"
        >
          Coffee Cupping & Tasting Event Registartion Form
        </h1>
        <form action="#" class="contact-form">
          <div class="form-1">
            <div class="input-box">
              <input type="text" class="full-name" required />
              <span
                class="full-name-span"
                data-aos="flip-right"
                data-aos-duration="4000"
                data-aos-easing="linear"
                >First Name</span
              >
            </div>
            <div class="input-box">
              <input type="text" class="lastName" required />
              <span
                class="email-span"
                data-aos="flip-right"
                data-aos-duration="4000"
                data-aos-easing="linear"
                >Last Name</span
              >
            </div>
          </div>
          <div class="form-2">
            <div class="input-box">
              <input type="text" class="no" required />
              <span
                class="no-span"
                data-aos="flip-right"
                data-aos-duration="4000"
                data-aos-easing="linear"
                >Email</span
              >
            </div>
            <div class="input-box">
              <input type="text" class="address" required />
              <span
                class="address-span"
                data-aos="flip-right"
                data-aos-duration="4000"
                data-aos-easing="linear"
                >Address</span
              >
            </div>
          </div>
          <div class="des-gp">
            <textarea name="des" class="des" required></textarea>
            <span
              class="des-span"
              data-aos="flip-right"
              data-aos-duration="4000"
              data-aos-easing="linear"
              >Notes</span
            >
          </div>
          <button class="contact-form-sumit">Submit</button>
        </form>
      </section>
      <footer class="main-footer">
        <div class="footer-container">
          <div class="footer-col">
            <h4>CUSTOMER CARE</h4>
            <ul>
              <li><a href="#">CONTACT US</a></li>
              <li><a href="#">CALL NOW: 800 227 8437</a></li>
            </ul>
          </div>

          <div class="footer-col">
            <h4>OUR COMPANY</h4>
            <ul>
              <li><a href="#">FIND A BOUTIQUE ↗</a></li>
              <li><a href="#">OUR STORY ↗</a></li>
              <li><a href="#"></a></li>
            </ul>
          </div>

          <div class="footer-col">
            <h4>EXPLORE</h4>
            <ul>
              <li><a href="#">SUSCRIPTION</a></li>
              <li><a href="#">MERCH</a></li>
              <li><a href="#">ABOUT OUR COFFEE</a></li>
            </ul>
          </div>

          <div class="footer-col">
            <h4>FOLLOW US</h4>
            <div class="social-links">
              <a href="#"><i class="fab fa-instagram"></i></a>
              <a href="#"><i class="fab fa-facebook-f"></i></a>
              <a href="#"><i class="fab fa-twitter"></i></a>
              <a href="#"><i class="fab fa-youtube"></i></a>
              <a href="#"><i class="fab fa-pinterest-p"></i></a>
            </div>
          </div>
        </div>
      </footer>
    </main>
  </body>
  <script src="js/header.js"></script>
  <script src="js/script.js"></script>
</html>
