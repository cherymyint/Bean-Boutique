<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Bean Boutique</title>
  <link rel="stylesheet" href="css/style.css" />
  <link href="https://api.iconify.design/material-symbols-light.css" rel="stylesheet" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
    integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
    crossorigin="anonymous" referrerpolicy="no-referrer" />
  <script src="https://code.iconify.design/iconify-icon/1.0.7/iconify-icon.min.js"></script>
</head>

<body>
  <main>
    <section class="conatct-section container">
      <h3 class="contact-section-title">Roasting Talk Registration Form</h3>
      <div class="conatct-content">
        <form action="contact" class="contact">
          <div class="first-input-contact">
            <div class="contact-name-div">
              <label for="firstName">First Name</label>
              <input type="text" class="contact-name" />
            </div>
            <div class="contact-name-div">
              <label for="lastName">Last Name</label>
              <input type="text" class="contact-name" />
            </div>
          </div>
          <div class="contact-name-div">
            <label for="name">Email</label>
            <input type="text" class="email-name" />
          </div>
          <div class="contact-name-div">
            <label for="phone">Phone Number</label>
            <input type="text" class="email-name" />
          </div>
          <div class="contact-name-div">
            <label for="notes">Notes</label>
            <textarea class="message"></textarea>
          </div>

        <div class="captcha-container">
          <input type="checkbox" id="not-a-robot" />
          <label for="not-a-robot">I'm not a robot</label>
          <iconify-icon
            icon="logos:recaptcha"
            width="34.56"
            height="32"
          ></iconify-icon>
        </div>
          <button class="contactBtn">Submit</button>
        </form>
      </div>
    </section>
    <footer class="main-footer">
      <div class="footer-container">
        <div class="footer-col">
          <h4>CUSTOMER CARE</h4>
          <ul>
            <li><a href="#">CONTACT US</a></li>
            <li><a href="#">CALL NOW: 800 227 8437</a></li>
          </ul>
        </div>

        <div class="footer-col">
          <h4>OUR COMPANY</h4>
          <ul>
            <li><a href="#">FIND A BOUTIQUE ↗</a></li>
            <li><a href="#">OUR STORY ↗</a></li>
            <li><a href="#"></a></li>
          </ul>
        </div>

        <div class="footer-col">
          <h4>EXPLORE</h4>
          <ul>
            <li><a href="#">SUSCRIPTION</a></li>
            <li><a href="#">MERCH</a></li>
            <li><a href="#">ABOUT OUR COFFEE</a></li>
          </ul>
        </div>

        <div class="footer-col">
          <h4>FOLLOW US</h4>
          <div class="social-links">
            <a href="#"><i class="fab fa-instagram"></i></a>
            <a href="#"><i class="fab fa-facebook-f"></i></a>
            <a href="#"><i class="fab fa-twitter"></i></a>
            <a href="#"><i class="fab fa-youtube"></i></a>
            <a href="#"><i class="fab fa-pinterest-p"></i></a>
          </div>
        </div>
      </div>
    </footer>
  </main>
</body>
<script src="js/header.js"></script>
<script src="js/script.js"></script>

</html>
