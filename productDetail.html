<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Bean Boutique</title>
  <link rel="stylesheet" href="css/style.css">
  <link href="https://api.iconify.design/material-symbols-light.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
    integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
    crossorigin="anonymous" referrerpolicy="no-referrer">
  <script src="https://code.iconify.design/iconify-icon/1.0.7/iconify-icon.min.js"></script>
</head>

<body>
  <main>
    <section class="productDetailSection">
      <div class="productDetail">
        <div class="productDetailImageWrapper">
          <img id="product-img" alt="Coffee" class="productDetailImg" src="about:blank">
          <span class="productDetailHot">🔥 Hot Item</span>
        </div>
        <div class="productDetailContent">
          <div class="productDetailHead">
            <div class="productDetailHeader">
              <h2 id="product-name">Product Name</h2>
              <p class="productDetailPrice" id="product-price">$</p>
            </div>
            <a href="" id="addToWishlist">
              <iconify-icon icon="ph:heart-light" width="25" height="25"></iconify-icon>
            </a>
          </div>
          <hr>
          <div class="flavourNotesDiv" id="desDiv">
            <h3 class="flavourNotesDetail">Description</h3>
            <p class="productDetailDescription" id="product-description"></p>
          </div>
          <div class="flavourNotesDiv" id="usageDiv">
            <h3 class="flavourNotesDetail">Usage</h3>
            <p class="flavourNotesContentDetail" id="brewingKitUsage"></p>
          </div>
          <div class="flavourNotesDiv" id="flavourNotesDiv">
            <h3 class="flavourNotesDetail">Flavour Notes</h3>
            <p class="flavourNotesContentDetail" id="flavourNotesContentDetail"></p>
          </div>
          <div class="brewingMethodsDiv" id="brewingMethodsDiv">
            <h3 class="flavourNotesDetail">Brewing Methods</h3>
            <img alt="Brewing Method" class="brewingMethodsImg" id="brewingMethodsImg" src="about:blank">
          </div>
          <span class="productDetailCategory" id="product-category"></span>
          <span class="productDetailCategory" id="import-country"></span>
          <div class="quantity-selector">
            <button id="minus">-</button>
            <input id="quantity" type="number" min="1" value="1" readonly>
            <button id="plus">+</button>
          </div>
          <button id="addToCart" type="submit">Add To Cart - $</button>
        </div>
      </div>
    </section>
  </main>
  <footer class="main-footer">
    <div class="footer-container">
      <div class="footer-col">
        <h4>CUSTOMER CARE</h4>
        <ul>
          <li>CONTACT US</li>
          <li>CALL NOW: 800 227 8437</li>
        </ul>
      </div>

      <div class="footer-col">
        <h4>OUR COMPANY</h4>
        <ul>
          <li><a href="coffee.html">FIND A COFFEE ↗</a></li>
          <li><a href="bean.html">FIND A BEAN ↗</a></li>
          <li><a href="brewingEqu.html">FIND A BREWING EQUIPMENT ↗</a></li>
        </ul>
      </div>

      <div class="footer-col">
        <h4>EXPLORE</h4>
        <ul>
          <li><a href="subscription.html">SUSCRIPTION ↗</a></li>
          <li><a href="events.html">EVENTS ↗</a></li>
        </ul>
      </div>

      <div class="footer-col">
        <h4>FOLLOW US</h4>
        <div class="social-links">
          <a href="https://www.instagram.com/"><i class="fab fa-instagram"></i></a>
          <a href="https://www.facebook.com/"><i class="fab fa-facebook-f"></i></a>
          <a href="https://x.com/"><i class="fab fa-twitter"></i></a>
          <a href="https://www.youtube.com/"><i class="fab fa-youtube"></i></a>
          <a href="https://www.pinterest.com/"><i class="fab fa-pinterest-p"></i></a>
        </div>
      </div>
    </div>
  </footer>
  <script src="js/header.js"></script>
  <script src="js/script.js"></script>
</body>
